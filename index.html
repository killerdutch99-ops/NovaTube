<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaTube</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
    <div class="logo">
        <h1>Nova<span>Tube</span></h1>
    </div>

    <div class="search">
        <input type="text" placeholder="Search videos...">
        <button>Search</button>
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Trending</a>
        <a href="#">Categories</a>
        <a href="#">Upload</a>
        <a href="#">Profile</a>
    </nav>
</header>

<main class="videos">

    <div class="card">
        <img src="assets/thumbnails/thumb1.jpg" alt="">
        <h3>Sample Video</h3>
        <p>120K views</p>
    </div>

    <div class="card">
        <img src="assets/thumbnails/thumb2.jpg" alt="">
        <h3>Another Video</h3>
        <p>98K views</p>
    </div>

</main>

<script src="js/app.js"></script>

</body>
</html>
